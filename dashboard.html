<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrazyKonfigs | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-body: #ffffff; --bg-nav: rgba(255, 255, 255, 0.95); --bg-card: #ffffff;
            --text-main: #000000; --text-muted: #666666; --border: #eeeeee; --tag-bg: #f5f5f5;
            --clr-owner: #e67e22; --clr-staff: #d4ac0d; --clr-contributor: #b7950b; --clr-tester: #27ae60; --clr-dev: #1e8449;
        }
        body.dark-mode {
            --bg-body: #0a0a0a; --bg-nav: rgba(10, 10, 10, 0.95); --bg-card: #121212;
            --text-main: #ffffff; --text-muted: #aaaaaa; --border: #1f1f1f; --tag-bg: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Source Sans Pro', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; display: none; }
        
        #cursor-follower { width: 30px; height: 30px; background: var(--text-main); opacity: 0.1; filter: blur(8px); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: transform 0.1s ease-out, background 0.3s ease; }

        nav { position: fixed; top: 0; width: 100%; padding: 1rem 8%; background: var(--bg-nav); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); transition: background-color 0.3s ease, border-color 0.3s ease; }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .header-pfp { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--text-main); transition: border-color 0.3s ease; }

        .section-padding { padding: 6rem 10% 4rem; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        
        .config-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; transition: 0.3s; }
        .config-card:hover { border-color: var(--text-main); }
        .system-tag { font-size: 0.7rem; font-weight: 900; background: var(--text-main); color: var(--bg-body); padding: 3px 8px; border-radius: 4px; transition: background-color 0.3s ease, color 0.3s ease; }

        .role-tag { font-size: 0.65rem; font-weight: 900; padding: 2px 8px; border-radius: 50px; text-transform: uppercase; border: 1px solid currentColor; }
        
        .filter-btn { padding: 8px 16px; background: none; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; border-radius: 4px; font-weight: 700; transition: 0.2s; }
        .filter-btn.active { background: var(--text-main); color: var(--bg-body); border-color: var(--text-main); }

        .form-input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid var(--border); background: var(--bg-body); color: var(--text-main); border-radius: 4px; transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
    </style>
</head>
<body id="body">
    <div id="cursor-follower"></div>

    <nav>
        <div style="display:flex; gap: 2rem; align-items: center;">
            <div style="font-weight: 900; border: 2px solid var(--text-main); padding: 4px 10px; transition: border-color 0.3s ease;">K</div>
            <span onclick="scrollToSection('contact')" style="cursor:pointer; font-weight:700; font-size: 0.8rem; text-transform: uppercase;">Requests</span>
        </div>
        <div style="display:flex; align-items: center; gap: 1.5rem;">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" style="background:none; border:none; color:var(--text-main); cursor:pointer; font-size:1.2rem; transition: color 0.3s ease;"><i class="fas fa-moon"></i></button>
            <div class="user-profile">
                <img src="" id="navPfp" class="header-pfp">
                <span id="navName" style="font-weight:700; font-size:0.85rem;">...</span>
                <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor:pointer; margin-left: 10px; font-size: 0.8rem;"></i>
            </div>
        </div>
    </nav>

    <section class="section-padding">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <h2 style="letter-spacing:-1px;">CONFIG INDEX</h2>
            <div style="display:flex; gap:8px;">
                <button class="filter-btn active" onclick="filterConfigs('all', this)">All</button>
                <button class="filter-btn" onclick="filterConfigs('low', this)">Low</button>
                <button class="filter-btn" onclick="filterConfigs('mid', this)">Mid</button>
                <button class="filter-btn" onclick="filterConfigs('high', this)">High</button>
            </div>
        </div>
        <div class="config-grid" id="config-container"></div>
    </section>

    <section class="section-padding" id="contributors">
        <h2 style="margin-bottom:2rem; letter-spacing:-1px;">TEAM</h2>
        <div id="contributor-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem;"></div>
    </section>

    <section class="section-padding" id="contact">
        <div style="max-width: 500px; margin: 0 auto; border: 1px solid var(--border); padding: 2rem; border-radius: 8px; background: var(--bg-card); transition: background-color 0.3s ease, border-color 0.3s ease;">
            <h3 style="margin-bottom:1.5rem; text-align:center;">SUBMIT REQUEST</h3>
            <form id="webhookForm">
                <input type="text" id="dcUser" placeholder="Discord Tag (User#0000)" class="form-input" required>
                <textarea id="dcDetails" placeholder="What settings are you looking for?" class="form-input" rows="4" required></textarea>
                <button type="submit" id="submitBtn" style="width:100%; padding:12px; background:var(--text-main); color:var(--bg-body); border:none; font-weight:900; border-radius:4px; cursor:pointer; transition: background-color 0.3s ease, color 0.3s ease;">SEND TO WEBHOOK</button>
                <p id="cooldownMsg" style="color:red; font-size:0.75rem; margin-top:10px; display:none; text-align:center;"></p>
            </form>
        </div>
    </section>

    <script>
        const _supabase = supabase.createClient('https://unjdjduiqtldgoybgmnq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuamRqZHViqXRsZGdveWJnbW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzgzODEsImV4cCI6MjA5MzAxNDM4MX0.qMuQcBysiKuFD5ByoL17fs0KxClgI-FEyzyKYayNVdE');
        let currentUser = null;
        let allConfigs = [];

        const follower = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
            } else {
                currentUser = session.user;
                
                // ---- DATABASE ENTRY CREATION LOGIC ADDED HERE ----
                // This will insert the user into your 'users' table, or update their data if they already exist.
                try {
                    const { error } = await _supabase.from('users').upsert([{
                        id: currentUser.id,
                        name: currentUser.user_metadata.full_name || currentUser.user_metadata.name,
                        avatar_url: currentUser.user_metadata.avatar_url,
                        last_login: new Date().toISOString()
                    }], { onConflict: 'id' });
                    
                    if (error) console.error("Database Entry Creation Failed:", error);
                } catch (e) {
                    console.error("Failed to execute database upsert:", e);
                }
                // --------------------------------------------------

                document.getElementById('navName').innerText = currentUser.user_metadata.full_name;
                document.getElementById('navPfp').src = currentUser.user_metadata.avatar_url;
                document.body.style.display = 'block';
                init();
            }
        }

        async function init() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.body.classList.remove('dark-mode');
                document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>';
            }

            fetchConfigs();
            fetchContributors();
        }

        async function fetchConfigs() {
            const { data } = await _supabase.from('configs').select('*').order('created_at', {ascending: false});
            allConfigs = data || [];
            renderConfigs(allConfigs);
        }

        function renderConfigs(configs) {
            const container = document.getElementById('config-container');
            container.innerHTML = configs.map(c => `
                <div class="config-card">
                    <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:1rem;">
                        <span style="font-weight:900; font-size:1.2rem;">${c.title}</span>
                        <span class="system-tag">${c.hit_rate}% HIT</span>
                    </div>
                    <div style="font-size:0.8rem; color:var(--text-muted); display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div>Timer: <b>${c.sim_timer}</b></div>
                        <div>Interval: <b>${c.interval || c.pred_interval}</b></div>
                    </div>
                </div>
            `).join('');
        }

        function filterConfigs(tier, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tier === 'all') renderConfigs(allConfigs);
            else renderConfigs(allConfigs.filter(c => c.tier?.toLowerCase() === tier));
        }

        async function fetchContributors() {
            const { data } = await _supabase.from('contributors').select('*');
            const container = document.getElementById('contributor-container');
            container.innerHTML = data.map(m => {
                const tagColor = m.role_color || (m.role === 'Owner' ? 'var(--clr-owner)' : 'var(--clr-contributor)');
                return `
                    <div style="display:flex; align-items:center; gap:15px; background:var(--bg-card); border:1px solid var(--border); padding:1rem; border-radius:8px; transition: background-color 0.3s ease, border-color 0.3s ease;">
                        <img src="${m.avatar_url}" style="width:40px; height:40px; border-radius:50%; border: 1px solid ${tagColor};">
                        <div>
                            <div style="font-weight:900; font-size:0.9rem;">${m.name}</div>
                            <span class="role-tag" style="color:${tagColor}">${m.role}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('webhookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const lastSent = localStorage.getItem('lastWebhook');
            const now = Date.now();
            const sixHours = 6 * 60 * 60 * 1000;

            if (lastSent && (now - lastSent < sixHours)) {
                const remaining = Math.ceil((sixHours - (now - lastSent)) / (60 * 60 * 1000));
                const msg = document.getElementById('cooldownMsg');
                msg.innerText = `Cooldown active. Try again in ${remaining} hours.`;
                msg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "SENDING...";
            setTimeout(() => {
                localStorage.setItem('lastWebhook', Date.now());
                btn.innerText = "SENT SUCCESSFULLY";
                btn.style.background = "#27ae60";
            }, 1000);
        });

        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }

        checkAuth();
    </script>
</body>
</html>
