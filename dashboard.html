<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Roblox UI Designer</title>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Sleek navy/charcoal background */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        img#avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #3b82f6; /* Subtle glow/border */
            margin-bottom: 1rem;
            display: none;
        }
        button {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #dc2626;
        }
        #error-message {
            color: #ef4444;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="status">Verifying Login...</h2>
        <img id="avatar" src="" alt="User Avatar">
        <h3 id="username"></h3>
        <p id="error-message"></p>
        
        <!-- Dashboard Content Goes Here -->
        <div id="dashboard-content" style="display: none; margin-top: 20px;">
            <p>Welcome to your Premium Dashboard.</p>
        </div>

        <button id="logout-btn" style="display: none;" onclick="logout()">Logout</button>
    </div>

    <script>
        // ==========================================
        // 1. INITIALIZE SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://unjdjduiqtldgoybgmnq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuamRqZHVpcXRsZGdveWJnbW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzgzODEsImV4cCI6MjA5MzAxNDM4MX0.qMuQcBysiKuFD5ByoL17fs0KxClgI-FEyzyKYayNVdE';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 2. MAIN AUTH & SYNC FUNCTION
        // ==========================================
        async function checkAuthAndSyncUser() {
            try {
                // A. Check if the user is actually logged in
                const { data: { session }, error: authError } = await _supabase.auth.getSession();

                if (authError || !session) {
                    console.error("Auth Error or No Session:", authError);
                    // Redirect back to login if no valid session is found
                    window.location.href = 'index.html'; 
                    return;
                }

                const user = session.user;
                console.log("Logged in as:", user);

                // Update UI to show loading is done
                document.getElementById('status').innerText = "Syncing Profile...";

                // Extract Discord Metadata (handles different ways Discord might send the name)
                const displayName = user.user_metadata.full_name || user.user_metadata.custom_claims?.global_name || 'Discord User';
                const avatarUrl = user.user_metadata.avatar_url;

                // B. Attempt the Upsert into the 'users' table
                const { error: dbError } = await _supabase
                    .from('users')
                    .upsert({
                        id: user.id, // This is a UUID
                        name: displayName,
                        avatar_url: avatarUrl,
                        last_login: new Date().toISOString()
                    });

                // C. Handle Database Errors (This will catch the UUID/BigInt issue if it still exists)
                if (dbError) {
                    console.error("CRITICAL DATABASE ERROR:", dbError);
                    document.getElementById('status').innerText = "Database Error";
                    document.getElementById('error-message').innerText = `Error: ${dbError.message}. Check console (F12) for details.`;
                    
                    // Notice we DO NOT redirect here. This lets you actually read the error on the screen/console!
                    return;
                }

                // D. Success! Update the UI
                console.log("Database sync successful!");
                document.getElementById('status').innerText = "Dashboard Ready";
                document.getElementById('username').innerText = displayName;
                
                const avatarImg = document.getElementById('avatar');
                if (avatarUrl) {
                    avatarImg.src = avatarUrl;
                    avatarImg.style.display = 'inline-block';
                }

                document.getElementById('dashboard-content').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'inline-block';

            } catch (err) {
                console.error("Unexpected Error:", err);
                document.getElementById('status').innerText = "An unexpected error occurred.";
            }
        }

        // ==========================================
        // 3. LOGOUT FUNCTION
        // ==========================================
        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        // Run the check as soon as the page loads
        document.addEventListener('DOMContentLoaded', checkAuthAndSyncUser);
    </script>
</body>
</html>
