<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrazyKonfigs | Precision Redefined</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-body: #ffffff; --bg-nav: rgba(255, 255, 255, 0.95); --bg-card: #ffffff;
            --text-main: #000000; --text-muted: #666666; --accent: #000000;
            --border: #eeeeee; --tag-bg: #f0f0f0; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --clr-owner: #e67e22; --clr-staff: #d4ac0d; --clr-guest: #8e44ad;
            --clr-early: #b7950b; --clr-contributor: #b7950b; --clr-tester: #27ae60;
            --clr-tuff: #555555; --clr-dev: #1e8449;
        }
        body.dark-mode {
            --bg-body: #0a0a0a; --bg-nav: rgba(10, 10, 10, 0.95); --bg-card: #121212;
            --text-main: #ffffff; --text-muted: #aaaaaa; --accent: #ffffff;
            --border: #1f1f1f; --tag-bg: #1a1a1a;
            --clr-owner: #FFA500; --clr-staff: #F5DEB3; --clr-guest: #EE82EE;
            --clr-early: #FFFF00; --clr-contributor: #FFFF00; --clr-tester: #00FF7F;
            --clr-tuff: #FFFFFF; --clr-dev: #2E8B57;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Source Sans Pro', sans-serif; transition: background-color 0.3s ease; line-height: 1.6; overflow-x: hidden; display: none; }
        
        #cursor-follower { width: 35px; height: 35px; background: var(--text-main); opacity: 0.15; filter: blur(6px); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); display: block; }

        nav { position: fixed; top: 0; width: 100%; padding: 1rem 8%; background: var(--bg-nav); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-k { font-size: 1.8rem; font-weight: 900; color: var(--text-main); border: 2px solid var(--text-main); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 4px; letter-spacing: -2px; padding-right: 2px; }
        .brand-text { font-size: 1.3rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;}

        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .user-profile { display: flex; align-items: center; gap: 12px; padding-left: 1.5rem; border-left: 1px solid var(--border); }
        .header-pfp { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--text-main); object-fit: cover; }
        .header-name { font-weight: 700; font-size: 0.85rem; color: var(--text-main); }

        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 5%; margin-top: 60px; }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; margin-bottom: 1rem; letter-spacing: -1.5px; text-transform: uppercase; }
        .section-padding { padding: 4rem 10%; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 2rem; }
        .config-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.8rem; transition: var(--transition); display: flex; flex-direction: column; }
        
        .review-drawer { display: none; margin-top: 1.5rem; border-top: 1px solid var(--border); padding-top: 1rem; }
        .tweet-comment { display: flex; gap: 10px; margin-bottom: 12px; font-size: 0.85rem; }
        .tweet-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); }
        .review-input-area { background: var(--tag-bg); padding: 12px; border-radius: 8px; margin-top: 10px; }
        .review-input-area textarea { width: 100%; background: none; border: none; color: var(--text-main); resize: none; outline: none; font-size: 0.8rem; }
        
        .btn-get-started { padding: 12px 32px; background: var(--text-main); color: var(--bg-body); text-decoration: none; font-weight: 700; border-radius: 50px; transition: var(--transition); }
        .btn-get-started:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .system-tag { font-size: 0.7rem; font-weight: 900; background: var(--text-main); color: var(--bg-body); padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body id="body">
    <div id="cursor-follower"></div>

    <nav>
        <a href="#" class="brand">
            <div class="logo-k">K</div>
            <div class="brand-text">KrazyKonfigs</div>
        </a>
        <div class="nav-right">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
            <div class="user-profile">
                <img src="" alt="" class="header-pfp" id="navPfp">
                <div style="display:flex; flex-direction:column;">
                    <span class="header-name" id="navName">...</span>
                    <span style="font-size: 0.6rem; color: var(--text-muted); cursor: pointer; text-decoration: underline;" onclick="logout()">Logout</span>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero" id="hero">
        <h1>Krazy Konfigs</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Engineered for peak simulation performance. Verified high-hit-rate presets.</p>
        <a href="#configs" class="btn-get-started">View Index</a>
    </section>

    <section class="section-padding" id="configs">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2.5rem;">
            <h2>Configs</h2>
            <div style="display:flex; gap:10px;">
                <button class="filter-btn active" onclick="filterConfigs('all', this)">All</button>
                <button class="filter-btn" onclick="filterConfigs('low', this)">Low</button>
                <button class="filter-btn" onclick="filterConfigs('high', this)">High</button>
            </div>
        </div>
        <div class="config-grid" id="config-container"></div>
    </section>

    <section class="section-padding" id="contributors" style="background: var(--tag-bg);">
        <h2>Contributors</h2>
        <div class="contributor-grid" id="contributor-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem;"></div>
    </section>

    <section class="section-padding" id="contact">
        <h2 style="text-align:center; margin-bottom:3rem;">New Request</h2>
        <div style="max-width:600px; margin:0 auto; border: 1px solid var(--border); padding: 2rem; border-radius: 12px; background: var(--bg-card);">
            <form id="webhookForm">
                <input type="text" id="dcUser" placeholder="Discord Username" style="width:100%; padding:12px; margin-bottom:1rem; border:1px solid var(--border); border-radius:6px; background: var(--bg-body); color: var(--text-main);" required>
                <textarea id="dcDetails" rows="4" placeholder="Request details..." style="width:100%; padding:12px; margin-bottom:1rem; border:1px solid var(--border); border-radius:6px; background: var(--bg-body); color: var(--text-main);" required></textarea>
                <button type="submit" id="submitBtn" style="width:100%; padding:14px; background:var(--text-main); color:var(--bg-body); border:none; font-weight:900; border-radius:6px; cursor:pointer; text-transform:uppercase;">Send Request</button>
            </form>
        </div>
    </section>

    <script>
        const _supabase = supabase.createClient('https://unjdjduiqtldgoybgmnq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuamRqZHVpcXRsZGdveWJnbW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzgzODEsImV4cCI6MjA5MzAxNDM4MX0.qMuQcBysiKuFD5ByoL17fs0KxClgI-FEyzyKYayNVdE');
        let currentUser = null;
        let allConfigs = [];

        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
            } else {
                currentUser = session.user;
                document.getElementById('navName').innerText = currentUser.user_metadata.full_name;
                document.getElementById('navPfp').src = currentUser.user_metadata.avatar_url;
                document.body.style.display = 'block';
                init();
            }
        }

        async function init() {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            fetchConfigs();
            fetchContributors();
        }

        async function fetchConfigs() {
            const { data } = await _supabase.from('configs').select('*').order('created_at', {ascending: false});
            allConfigs = data || [];
            renderConfigs(allConfigs);
        }

        function renderConfigs(configs) {
            const container = document.getElementById('config-container');
            container.innerHTML = configs.map(c => `
                <div class="config-card">
                    <div style="border-bottom: 2px solid var(--text-main); margin-bottom: 1.5rem; padding-bottom: 0.5rem;">
                        <span style="font-weight:900; font-size:1.4rem;">${c.title}</span>
                    </div>
                    <div style="font-size:0.85rem; margin-bottom: 15px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span style="color:var(--text-muted)">Sim Timer</span> <b>${c.sim_timer}</b></div>
                        <div style="display:flex; justify-content:space-between;"><span style="color:var(--text-muted)">Interval</span> <b>${c.pred_interval || c.interval}</b></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; border-top: 1px dashed var(--border); padding-top:15px;">
                        <span class="system-tag">${c.hit_rate}% Hit Rate</span>
                        <button onclick="toggleReviews(${c.id})" style="background:none; border:none; color:var(--text-muted); font-size:0.75rem; cursor:pointer; font-weight:700;">REVIEWS <i class="fas fa-chevron-down"></i></button>
                    </div>
                    <div class="review-drawer" id="drawer-${c.id}">
                        <div id="feed-${c.id}"></div>
                        <div class="review-input-area">
                            <textarea id="input-${c.id}" placeholder="How's it performing?"></textarea>
                            <button onclick="postReview(${c.id})" style="background:var(--text-main); color:var(--bg-body); border:none; padding:6px 15px; border-radius:4px; font-size:0.7rem; font-weight:900; cursor:pointer;">POST</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleReviews(id) {
            const dr = document.getElementById(`drawer-${id}`);
            dr.style.display = dr.style.display === 'block' ? 'none' : 'block';
            if(dr.style.display === 'block') loadReviews(id);
        }

        async function loadReviews(id) {
            const { data } = await _supabase.from('reviews').select('*').eq('config_id', id).order('created_at', {ascending: false});
            const feed = document.getElementById(`feed-${id}`);
            feed.innerHTML = data.map(r => `
                <div class="tweet-comment">
                    <img src="${r.poster_avatar}" class="tweet-avatar">
                    <div>
                        <div style="font-weight:900; font-size:0.75rem;">${r.poster_name}</div>
                        <div style="font-size:0.8rem; color:var(--text-muted);">${r.comment}</div>
                    </div>
                </div>
            `).join('');
        }

        async function postReview(id) {
            const text = document.getElementById(`input-${id}`).value;
            if(!text.trim()) return;
            await _supabase.from('reviews').insert([{
                config_id: id, comment: text,
                poster_name: currentUser.user_metadata.full_name,
                poster_avatar: currentUser.user_metadata.avatar_url
            }]);
            document.getElementById(`input-${id}`).value = "";
            loadReviews(id);
        }

        async function fetchContributors() {
            const { data } = await _supabase.from('contributors').select('*');
            document.getElementById('contributor-container').innerHTML = data.map(m => `
                <div style="background:var(--bg-card); border:1px solid var(--border); padding:1.2rem; border-radius:10px;">
                    <div style="font-weight:900; margin-bottom:8px;">${m.name}</div>
                    <div style="display:flex; flex-wrap:wrap; gap:5px;">
                        ${m.tags ? m.tags.map(t => `<span style="font-size:0.6rem; font-weight:900; border:1px solid var(--text-main); padding:2px 8px; border-radius:50px;">${t}</span>`).join('') : ''}
                    </div>
                </div>
            `).join('');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'login.html'; }

        checkAuth();
    </script>
</body>
</html>
