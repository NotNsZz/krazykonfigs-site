<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Krazy Konfigs</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --border: #1f1f1f;
            --accent: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Source Sans Pro', sans-serif;
            margin: 0;
            padding: 2rem 5%;
        }

        /* --- Profile Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
            margin-bottom: 3rem;
        }

        .user-info { display: flex; align-items: center; gap: 1rem; }
        .user-info img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border); }
        .user-info h2 { font-weight: 900; margin: 0; font-size: 1.5rem; letter-spacing: -1px; }

        /* --- Section Grid --- */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 3rem;
        }

        h3 { text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; }

        /* --- Config Cards --- */
        .config-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            transition: border-color 0.3s ease;
        }
        .config-card:hover { border-color: var(--accent); }
        .config-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .config-title { font-weight: 700; font-size: 1.1rem; }
        .ping-badge { font-size: 0.7rem; padding: 3px 8px; border: 1px solid var(--accent); color: var(--accent); border-radius: 2px; }
        
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem; }
        .stat-item { font-size: 0.8rem; color: var(--text-muted); }
        .stat-value { color: var(--text-main); font-weight: 600; display: block; }

        /* --- Contributors Sidebar --- */
        .contributor-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border);
        }
        .role-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 0.7rem; }

        button.logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; cursor: pointer; }
        button.logout:hover { color: white; border-color: white; }

        .loading-state { text-align: center; margin-top: 5rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div id="loading" class="loading-state">Initializing secure session...</div>

    <div id="main-content" style="display: none;">
        <div class="header">
            <div class="user-info">
                <img id="user-avatar" src="" alt="">
                <div>
                    <h2 id="user-display-name">USER</h2>
                    <span id="user-role" style="font-size: 0.7rem; color: var(--accent); text-transform: uppercase;">Authenticated Member</span>
                </div>
            </div>
            <button class="logout" onclick="logout()">LOGOUT</button>
        </div>

        <div class="grid-container">
            <!-- Left: Configurations -->
            <section>
                <h3>Active Configurations</h3>
                <div id="configs-list">
                    <!-- Configs will load here -->
                </div>
            </section>

            <!-- Right: Contributors -->
            <aside>
                <h3>Contributors</h3>
                <div id="contributors-list">
                    <!-- Contributors will load here -->
                </div>
            </aside>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://unjdjduiqtldgoybgmnq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuamRqZHVpcXRsZGdveWJnbW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzgzODEsImV4cCI6MjA5MzAxNDM4MX0.qMuQcBysiKuFD5ByoL17fs0KxClgI-FEyzyKYayNVdE';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function start() {
            // 1. Auth Check & Sync (Matches image_bfcd23.png schema)
            const { data: { session }, error: authError } = await _supabase.auth.getSession();
            if (authError || !session) { window.location.href = 'index.html'; return; }

            const user = session.user;
            const meta = user.user_metadata;

            const { error: syncError } = await _supabase.from('users').upsert({
                id: user.id, // Primary Key UUID
                discord_id: user.id,
                username: meta.full_name || meta.custom_claims?.global_name || 'Designer',
                avatar_url: meta.avatar_url,
                last_login: new Date().toISOString()
            });

            if (syncError) console.error("Sync Error:", syncError);

            // 2. Load UI Data
            document.getElementById('user-avatar').src = meta.avatar_url;
            document.getElementById('user-display-name').innerText = (meta.full_name || 'USER').toUpperCase();
            
            await Promise.all([fetchConfigs(), fetchContributors()]);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        async function fetchConfigs() {
            const { data, error } = await _supabase.from('configs').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('configs-list');
            
            if (data) {
                list.innerHTML = data.map(cfg => `
                    <div class="config-card">
                        <div class="config-header">
                            <span class="config-title">${cfg.title}</span>
                            <span class="ping-badge">${cfg.ping_tier}</span>
                        </div>
                        <div class="stats-row">
                            <div class="stat-item">SIM TIMER <span class="stat-value">${cfg.sim_timer}</span></div>
                            <div class="stat-item">PRED INTERVAL <span class="stat-value">${cfg.pred_interval}</span></div>
                            <div class="stat-item">HIT RATE <span class="stat-value">${cfg.hit_rate}</span></div>
                            <div class="stat-item">CREATOR <span class="stat-value">${cfg.creator}</span></div>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function fetchContributors() {
            // Mapping to your schema: nama, role_icon, icon_color
            const { data, error } = await _supabase.from('contributors').select('*');
            const list = document.getElementById('contributors-list');

            if (data) {
                list.innerHTML = data.map(con => `
                    <div class="contributor-item">
                        <div class="role-icon" style="background: ${con.icon_color}22; color: ${con.icon_color}; border: 1px solid ${con.icon_color}44;">
                            ${con.role_icon || 'ID'}
                        </div>
                        <div style="font-size: 0.9rem; font-weight: 600;">${con.nama}</div>
                    </div>
                `).join('');
            }
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', start);
    </script>
</body>
</html>
