<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krazy Konfigs | Dashboard</title>
    <!-- Source Sans Pro Font -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-body: #ffffff; --bg-nav: rgba(255, 255, 255, 0.95); --bg-card: #ffffff;
            --text-main: #000000; --text-muted: #666666; --border: #eeeeee; --tag-bg: #f0f0f0;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --glow-color: rgba(0, 0, 0, 0.15);
            --card-inner: #f9f9f9;
        }
        body.dark-mode {
            --bg-body: #0a0a0a; --bg-nav: rgba(10, 10, 10, 0.95); --bg-card: #121212;
            --text-main: #ffffff; --text-muted: #aaaaaa; --border: #1f1f1f; --tag-bg: #1a1a1a;
            --glow-color: rgba(255, 255, 255, 0.15);
            --card-inner: #151515;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Source Sans Pro', sans-serif; transition: background-color 0.3s; display: none; overflow-x: hidden; }
        
        #cursor-follower { width: 35px; height: 35px; background: var(--text-main); opacity: 0.15; filter: blur(6px); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }

        /* --- Header Fixes --- */
        nav { position: fixed; top: 0; width: 100%; padding: 1rem 5%; background: var(--bg-nav); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .brand-container { display: flex; align-items: center; gap: 0.8rem; }
        .logo-k { font-size: 1.4rem; font-weight: 900; color: var(--text-main); border: 2px solid var(--text-main); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 4px; letter-spacing: -1px; padding-right: 1px; }
        
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-link { cursor: pointer; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; text-decoration: none; color: var(--text-main); transition: var(--transition); }
        .nav-link:hover { color: var(--text-muted); }
        
        /* User Profile & Hover Expand */
        .user-profile { display: flex; align-items: center; }
        .username-container {
            max-width: 0; overflow: hidden; white-space: nowrap; 
            transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s, margin-right 0.3s;
            opacity: 0; display: flex; align-items: center; font-weight: 700; font-size: 0.85rem;
        }
        .user-profile:hover .username-container { max-width: 150px; opacity: 1; margin-right: 12px; }
        
        /* Dropdown Fix */
        .pfp-container { position: relative; cursor: pointer; display: flex; align-items: center; }
        .header-pfp { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }
        .dropdown-menu {
            position: absolute; top: 130%; right: 0; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: none; min-width: 140px;
            flex-direction: column; z-index: 1000;
        }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { padding: 10px 12px; font-size: 0.85rem; font-weight: 700; cursor: pointer; border-radius: 4px; transition: var(--transition); }
        .dropdown-item:hover { background: var(--tag-bg); color: #ed4245; }
        .dropdown-item.admin-btn:hover { color: #5865F2; }

        .theme-toggle { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-main); padding: 0; display: flex; align-items: center; transition: var(--transition); }
        
        /* --- Hero --- */
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 5%; margin-top: 60px; }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; margin-bottom: 1rem; letter-spacing: -1.5px; text-transform: uppercase; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin-bottom: 2.5rem; }
        .hero-btn { padding: 16px 40px; border-radius: 4px; background: var(--text-main); color: var(--bg-body); font-size: 1rem; font-weight: 800; cursor: pointer; text-decoration: none; transition: var(--transition); border: 2px solid var(--text-main); text-transform: uppercase; }
        .hero-btn:hover { background: transparent; color: var(--text-main); }

        .section-padding { padding: 4rem 10%; }
        
        /* --- Config Cards Redesign --- */
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 2rem; }
        .config-card { background: var(--card-inner); border: 1px solid var(--border); border-radius: 8px; padding: 2rem; transition: var(--transition); display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        
        .card-head { margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-divider { height: 2px; width: 100%; background: var(--border); margin-bottom: 1.5rem; }
        
        .section-label { font-size: 0.8rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .data-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.9rem; font-weight: 600; }
        .data-val { font-weight: 800; color: var(--text-main); }
        
        .card-footer-box { margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: flex-end; }
        .revert-badge { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); padding: 6px 12px; font-weight: 900; font-size: 0.75rem; border-radius: 4px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .review-trigger-btn { margin-top: 1.5rem; width: 100%; padding: 12px; border-radius: 4px; background: transparent; border: 1px solid var(--text-main); color: var(--text-main); font-weight: 700; cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 8px; font-family: inherit; }
        .review-trigger-btn:hover { background: var(--text-main); color: var(--bg-body); }

        .filter-btn { padding: 8px 20px; border-radius: 4px; border: 1px solid var(--border); background: var(--card-inner); color: var(--text-main); font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: var(--transition); text-transform: uppercase; }
        .filter-btn.active { background: var(--text-main); color: var(--bg-body); border-color: var(--text-main); }

        /* --- Contributor Cards Redesign --- */
        .member-card { background: var(--card-inner); border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; display: flex; flex-direction: column; gap: 1rem; transition: var(--transition); }
        .member-header { display: flex; align-items: center; gap: 12px; }
        
        /* Vibrant Badges */
        .badge-tag { 
            font-size: 0.65rem; padding: 4px 10px; border-radius: 20px; font-weight: 800; text-transform: uppercase; 
            background: transparent; border: 1px solid currentColor;
            letter-spacing: 0.5px;
        }
        body:not(.dark-mode) .badge-tag { filter: saturate(1.5) brightness(0.8); }

        /* --- Request Form Fix --- */
        .request-container { max-width: 450px; margin: 0 auto; border: 1px solid var(--border); padding: 2rem; border-radius: 8px; background: var(--card-inner); }
        .form-input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid var(--border); background: var(--bg-body); color: var(--text-main); border-radius: 4px; font-family: inherit; font-weight: 600; outline: none; transition: border-color 0.3s; }
        .form-input:focus { border-color: var(--text-main); }

        /* --- Review Modal System --- */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 2000; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-card); width: 95%; max-width: 500px; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; max-height: 85vh; transform: translateY(20px); transition: transform 0.3s; box-shadow: 0 25px 50px rgba(0,0,0,0.25); }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 1.5rem; }
        
        .review-item { display: flex; gap: 12px; }
        .review-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); }
        .review-content { flex: 1; }
        .review-user-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .review-stars { color: #f1c40f; font-size: 0.8rem; }
        
        .review-input-area { padding: 1.5rem; border-top: 1px solid var(--border); background: var(--card-inner); }
        .input-stars { margin-bottom: 10px; font-size: 1.2rem; display: flex; gap: 5px; }
        .input-star { color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
        .input-star.active { color: #f1c40f; }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body id="body">
    <div id="cursor-follower"></div>

    <nav>
        <div class="brand-container">
            <div class="logo-k">K</div>
            <span style="font-weight:900; font-size: 1.2rem; letter-spacing: 0.5px; text-transform: uppercase;">Krazy Konfigs</span>
        </div>
        
        <div style="display:flex; align-items: center; gap: 2rem;">
            <div class="nav-links">
                <a href="#about" class="nav-link">About</a>
                <a href="#configs" class="nav-link">Configs</a>
                <a href="#contributors" class="nav-link">Contributors</a>
                <a href="#contact" class="nav-link">Request</a>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle Theme"><i class="fas fa-moon"></i></button>
            
            <div class="user-profile">
                <div class="username-container">
                    <span id="navName">User</span>
                </div>
                <div class="pfp-container" onclick="toggleUserDropdown(event)">
                    <img src="https://via.placeholder.com/32" id="navPfp" class="header-pfp" alt="PFP">
                    <div class="dropdown-menu" id="userDropdown">
                        <div id="adminPanelOption" style="display:none;" class="dropdown-item admin-btn"><i class="fas fa-shield-alt"></i> Admin Panel</div>
                        <div class="dropdown-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Log Out</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero" id="about">
        <h1>Krazy Konfigs</h1>
        <p>Precision-engineered simulation presets mapped directly to your exact connection type.</p>
        <a href="#configs" class="hero-btn">Explore Database</a>
    </section>

    <section class="section-padding" id="configs">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2.5rem; flex-wrap: wrap; gap: 1rem;">
            <h2 style="font-weight: 900; font-size: 2rem; letter-spacing: -1px;">CONFIGS</h2>
            <div style="display:flex; gap: 0.8rem;">
                <button class="filter-btn active" onclick="filterConfigs('all', this)">All</button>
                <button class="filter-btn" onclick="filterConfigs('low', this)">Low Ping</button>
                <button class="filter-btn" onclick="filterConfigs('mid', this)">Mid Ping</button>
                <button class="filter-btn" onclick="filterConfigs('high', this)">High Ping</button>
            </div>
        </div>
        <div class="config-grid" id="config-container"></div>
    </section>

    <section class="section-padding" id="contributors" style="background: var(--tag-bg);">
        <h2 style="font-weight: 900; font-size: 2rem; letter-spacing: -1px; margin-bottom:2.5rem;">CONTRIBUTORS</h2>
        <div id="contributor-container" class="config-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));"></div>
    </section>

    <section class="section-padding" id="contact">
        <div class="request-container">
            <h3 style="text-align:center; margin-bottom:1.5rem; font-weight:900; font-size: 1.5rem;">SUBMIT REQUEST</h3>
            <form id="webhookForm">
                <input type="text" id="dcUser" placeholder="Discord Username" class="form-input" required>
                <textarea id="dcDetails" rows="4" placeholder="Details (Suggestions or Requests)..." class="form-input" required></textarea>
                <label style="font-size:0.75rem; font-weight:700; color:var(--text-muted); display:block; margin-bottom:5px;">Include File (Max 10MB)</label>
                <input type="file" id="dcFile" style="width:100%; margin-bottom:1.5rem; color: var(--text-muted); font-size: 0.8rem;">
                <button type="submit" id="submitBtn" class="hero-btn" style="width:100%;">Submit Request</button>
            </form>
        </div>
    </section>

    <!-- Review Modal System -->
    <div id="reviewModal" class="modal-overlay" onclick="closeReviews(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 style="font-weight: 900; margin: 0; font-size: 1.2rem;">Config Reviews</h3>
                <button onclick="closeReviews()" style="background:none; border:none; color:var(--text-main); font-size:1.2rem; cursor:pointer;"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="reviewList">
                <!-- Reviews populated here -->
            </div>
            <div class="review-input-area">
                <div class="input-stars" id="starSelector">
                    <i class="fas fa-star input-star active" data-val="1"></i>
                    <i class="fas fa-star input-star active" data-val="2"></i>
                    <i class="fas fa-star input-star active" data-val="3"></i>
                    <i class="fas fa-star input-star active" data-val="4"></i>
                    <i class="fas fa-star input-star active" data-val="5"></i>
                </div>
                <div style="display:flex; gap: 10px;">
                    <input type="text" id="reviewTextInput" class="form-input" style="margin:0;" placeholder="Write a review...">
                    <button onclick="submitReview()" class="hero-btn" style="padding: 10px 20px; border-radius: 4px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://unjdjduiqtldgoybgmnq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuamRqZHVpcXRsZGdveWJnbW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzgzODEsImV4cCI6MjA5MzAxNDM4MX0.qMuQcBysiKuFD5ByoL17fs0KxClgI-FEyzyKYayNVdE');
        
        let allConfigs = [];
        let currentUser = null;
        let activeConfigId = null;
        let currentRatingInput = 5;

        // Custom Cursor Tracker
        const follower = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        // Dropdown toggle logic
        function toggleUserDropdown(e) {
            e.stopPropagation();
            document.getElementById('userDropdown').classList.toggle('show');
        }
        document.addEventListener('click', () => {
            document.getElementById('userDropdown').classList.remove('show');
        });

        // --- Auth & Session Logic ---
        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
                if (session) handleSession(session);
                else if (event === 'INITIAL_SESSION') window.location.href = 'login.html';
            }
        });

        async function handleSession(session) {
            const user = session.user;
            const meta = user.user_metadata;
            // Get actual Discord ID from provider metadata
            const discordId = meta.provider_id || user.id;

            currentUser = {
                id: user.id,
                discord_id: discordId,
                username: meta.full_name || meta.name || 'User',
                avatar_url: meta.avatar_url,
                role: meta.role || 'user'
            };

            // Safely Upsert user
            try {
                const { error } = await _supabase.from('users').upsert({
                    id: currentUser.id, 
                    discord_id: currentUser.discord_id,
                    username: currentUser.username,
                    avatar_url: currentUser.avatar_url,
                    last_login: new Date().toISOString()
                });
                if(error) console.warn("Upsert issue (Check RLS Policies): ", error.message);
            } catch (err) {
                console.error("DB Sync Error:", err);
            }

            // Update UI
            document.getElementById('navName').innerText = currentUser.username;
            document.getElementById('navPfp').src = currentUser.avatar_url || 'https://via.placeholder.com/32';
            
            if(currentUser.role === 'admin') {
                document.getElementById('adminPanelOption').style.display = 'block';
            }

            document.body.style.display = 'block';
            init();
        }

        async function init() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
            }
            fetchConfigs();
            fetchContributors();
        }

        // --- Config Logic ---
        async function fetchConfigs() {
            const { data } = await _supabase.from('configs').select('*').order('created_at', {ascending: false});
            allConfigs = data || [];
            renderConfigs(allConfigs);
        }

        function renderConfigs(configs) {
            const container = document.getElementById('config-container');
            container.innerHTML = configs.map(c => `
                <div class="config-card">
                    <div>
                        <div class="card-head">
                            <i class="fas fa-snowflake" style="color: var(--text-muted);"></i>
                            ${c.title} | ${c.ping_tier || 'N/A'} PING
                        </div>
                        <div class="card-divider"></div>
                        
                        <div style="margin-bottom: 1.2rem;">
                            <div class="section-label"><i class="fas fa-bullseye" style="color:#ed4245;"></i> PREDICTION</div>
                            <div class="data-row"><span style="color:var(--text-muted)">Simulation Timer</span> <span class="data-val">${c.sim_timer ?? '-'}</span></div>
                            <div class="data-row"><span style="color:var(--text-muted)">Prediction Interval</span> <span class="data-val">${c.pred_interval || '-'}</span></div>
                        </div>

                        <div style="margin-bottom: 1.2rem;">
                            <div class="section-label"><i class="fas fa-cog" style="color:#a6aeb9;"></i> TOGGLES</div>
                            <div class="data-row"><span style="color:var(--text-muted)">Prioritize Ping</span> <span class="data-val">ON</span></div>
                            <div class="data-row"><span style="color:var(--text-muted)">Predict Jump</span> <span class="data-val">ON</span></div>
                            <div class="data-row"><span style="color:var(--text-muted)">Predict Lag</span> <span class="data-val">ON</span></div>
                            <div class="data-row"><span style="color:var(--text-muted)">Ping Predict</span> <span class="data-val">ON</span></div>
                        </div>

                        <div style="margin-bottom: 1.2rem;">
                            <div class="section-label"><i class="fas fa-sliders-h" style="color:#5865F2;"></i> MULTIPLIERS</div>
                            <div class="data-row"><span style="color:var(--text-muted)">Vertical</span> <span class="data-val">${c.vertical ?? '155'}</span></div>
                            <div class="data-row"><span style="color:var(--text-muted)">Horizontal</span> <span class="data-val">${c.horizontal ?? '165'}</span></div>
                        </div>

                        <div style="margin-bottom: 1.2rem;">
                            <div class="section-label"><i class="fas fa-thumbtack" style="color:#e83e8c;"></i> OFFSETS</div>
                            <div class="data-row"><span style="color:var(--text-muted)">X / Y / Z</span> <span class="data-val">${c.offsets || '0 / -5 / 0'}</span></div>
                        </div>
                    </div>

                    <div>
                        <div class="card-footer-box">
                            <div>
                                <div class="revert-badge">REVERT | ${c.hit_rate || 85}% HIT RATE</div>
                                <div style="font-size:0.75rem; font-weight: 700; color:var(--text-muted); margin-top: 8px;">Supports: ${c.support_range || '150ms - 200ms'}</div>
                            </div>
                            <span style="font-size:0.8rem; font-style:italic; font-weight: 600; color:var(--text-muted)">by ${c.creator || 'Kriz'}</span>
                        </div>
                        <button class="review-trigger-btn" onclick="openReviews(${c.id})"><i class="fas fa-star"></i> View Reviews</button>
                    </div>
                </div>
            `).join('');
        }

        function filterConfigs(tier, btn) {
            document.querySelectorAll('#configs .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = tier === 'all' 
                ? allConfigs 
                : allConfigs.filter(c => c.ping_tier && c.ping_tier.toLowerCase().includes(tier.toLowerCase()));
            renderConfigs(filtered);
        }

        // --- Contributors Logic ---
        function getBadgeColor(tag) {
            const t = tag.toUpperCase();
            if(t.includes('OWNER') || t.includes('EARLY')) return '#f1c40f'; // Yellow/Orange
            if(t.includes('DEVELOPER') || t.includes('TESTER')) return '#2ecc71'; // Green
            if(t.includes('GUEST')) return '#9b59b6'; // Purple
            if(t.includes('STAFF') || t.includes('TUFF')) return 'var(--text-main)'; // White/Black based on theme
            return 'var(--text-muted)';
        }

        async function fetchContributors() {
            const { data } = await _supabase.from('contributors').select('*').order('created_at', {ascending: true});
            const container = document.getElementById('contributor-container');
            
            container.innerHTML = (data || []).map(m => {
                let tagsArray = [];
                if (Array.isArray(m.tags)) tagsArray = m.tags;
                else if (typeof m.tags === 'string') tagsArray = m.tags.split(',').map(t => t.trim());

                const tagsHtml = tagsArray.map(tag => {
                    const color = getBadgeColor(tag);
                    return `<span class="badge-tag" style="color: ${color};">${tag}</span>`;
                }).join('');

                return `
                <div class="member-card">
                    <div class="member-header">
                        <i class="${m.role_icon || 'fas fa-crown'}" style="color: ${m.icon_color || '#f1c40f'}; font-size: 1.2rem;"></i>
                        <span style="font-weight: 900; font-size: 1.2rem;">${m.name || 'Unknown'}</span>
                    </div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;">
                        ${tagsHtml}
                    </div>
                </div>
            `}).join('');
        }

        // --- Review System Logic ---
        async function openReviews(configId) {
            activeConfigId = configId;
            document.getElementById('reviewModal').classList.add('show');
            document.getElementById('reviewList').innerHTML = `<p style="text-align:center; color:var(--text-muted);">Loading reviews...</p>`;
            
            const { data, error } = await _supabase.from('reviews').select('*').eq('config_id', configId).order('created_at', {ascending: false});
            
            const container = document.getElementById('reviewList');
            if(error || !data || data.length === 0) {
                container.innerHTML = `<p style="text-align:center; font-weight:700; color:var(--text-muted);">No reviews yet. Be the first!</p>`;
                return;
            }

            container.innerHTML = data.map(r => {
                const stars = Array(5).fill(0).map((_,i) => i < r.rating ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>').join('');
                return `
                <div class="review-item">
                    <img src="${r.poster_avatar || 'https://via.placeholder.com/40'}" class="review-avatar">
                    <div class="review-content">
                        <div class="review-user-row">
                            <span style="font-weight: 800; font-size:0.9rem;">${r.poster_username || 'Anonymous'}</span>
                            <span class="review-stars">${stars}</span>
                        </div>
                        <p style="font-size:0.9rem; color:var(--text-muted); line-height: 1.4;">${r.comment}</p>
                    </div>
                </div>
                `;
            }).join('');
        }

        function closeReviews(e) {
            if(e && e.target !== document.getElementById('reviewModal')) return;
            document.getElementById('reviewModal').classList.remove('show');
            activeConfigId = null;
        }

        // Star Selection Logic
        document.querySelectorAll('.input-star').forEach(star => {
            star.addEventListener('click', (e) => {
                currentRatingInput = parseInt(e.target.getAttribute('data-val'));
                document.querySelectorAll('.input-star').forEach(s => {
                    const val = parseInt(s.getAttribute('data-val'));
                    if(val <= currentRatingInput) s.classList.add('active');
                    else s.classList.remove('active');
                });
            });
        });

        // Submit via Enter Key
        document.getElementById('reviewTextInput').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') submitReview();
        });

        async function submitReview() {
            const input = document.getElementById('reviewTextInput');
            const comment = input.value.trim();
            if(!comment || !activeConfigId || !currentUser) return;

            input.disabled = true;
            
            const { error } = await _supabase.from('reviews').insert({
                config_id: activeConfigId,
                poster_id: currentUser.discord_id,
                poster_username: currentUser.username,
                poster_avatar: currentUser.avatar_url,
                rating: currentRatingInput,
                comment: comment,
                created_at: new Date().toISOString()
            });

            input.disabled = false;
            
            if(!error) {
                input.value = '';
                openReviews(activeConfigId); // refresh
            } else {
                alert("Failed to post review. Check console.");
                console.error(error);
            }
        }

        // --- Webhook Form Logic ---
        document.getElementById('webhookForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const lastSent = localStorage.getItem('lastSentTimestamp');
            const cooldown = 6 * 60 * 60 * 1000; 

            if (lastSent && (Date.now() - lastSent < cooldown)) {
                alert(`Cooldown active. Try again in ${Math.ceil((cooldown - (Date.now() - lastSent)) / 3600000)} hours.`);
                return;
            }

            const fileInput = document.getElementById('dcFile');
            if (fileInput.files.length > 0 && fileInput.files[0].size > 10 * 1024 * 1024) {
                alert('File is too large! (10MB Max)'); return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true; submitBtn.innerText = "Sending...";

            const formData = new FormData();
            formData.append('payload_json', JSON.stringify({
                embeds: [{ title: "New Config Request", fields: [
                    { name: "User", value: document.getElementById('dcUser').value, inline: true },
                    { name: "Message", value: document.getElementById('dcDetails').value }
                ], timestamp: new Date() }]
            }));
            if (fileInput.files.length > 0) formData.append('file', fileInput.files[0]);

            try {
                // Ensure to replace this webhook URL if it's dead, currently using the one provided
                const res = await fetch("https://discord.com/api/webhooks/1498387587092709468/EY0XBVlIy5cnAgaIJxWbTliIB8lPvfrywiCXM4tMmw6Y2D7ku5wgIbFFSb-8YC_wCECz", { method: 'POST', body: formData });
                if (res.ok) { alert('Sent!'); localStorage.setItem('lastSentTimestamp', Date.now()); document.getElementById('webhookForm').reset(); }
            } catch (err) { alert('Error sending request.'); }
            submitBtn.disabled = false; submitBtn.innerText = "Submit Request";
        });

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'login.html'; }
        
    </script>
</body>
</html>
