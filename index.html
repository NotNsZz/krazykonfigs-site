<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrazyKonfigs | Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-body: #ffffff; --text-main: #000000; --text-muted: #666666; --border: #eeeeee; --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        body.dark-mode { --bg-body: #0a0a0a; --text-main: #ffffff; --text-muted: #aaaaaa; --border: #1f1f1f; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Source Sans Pro', sans-serif; margin: 0; transition: background-color 0.4s ease; overflow-x: hidden; }
        nav { padding: 1.5rem 8%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 100; background: var(--bg-body); }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 10%; }
        h1 { font-size: clamp(3rem, 10vw, 5.5rem); font-weight: 900; letter-spacing: -4px; margin-bottom: 1rem; text-transform: uppercase; }
        .btn-get-started { padding: 16px 45px; background: var(--text-main); color: var(--bg-body); text-decoration: none; font-weight: 700; border-radius: 4px; border: 2px solid var(--text-main); cursor: pointer; transition: var(--transition); }
        .btn-get-started:hover { background: transparent; color: var(--text-main); }
        .theme-toggle { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 900; border: 2px solid var(--text-main); padding: 5px 12px;">K</div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
    </nav>
    <section class="hero">
        <h1>KRAZY KONFIGS</h1>
        <p style="max-width: 600px; margin-bottom: 3rem; color: var(--text-muted);">Precision-engineered simulation presets. Authorized access only.</p>
        <div onclick="handleStart()" class="btn-get-started">GET STARTED <i class="fas fa-arrow-right" style="margin-left:10px;"></i></div>
    </section>

    <script>
        const _supabase = supabase.createClient('https://unjdjduiqtldgoybgmnq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuamRqZHVpcXRsZGdveWJnbW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzgzODEsImV4cCI6MjA5MzAxNDM4MX0.qMuQcBysiKuFD5ByoL17fs0KxClgI-FEyzyKYayNVdE');

        async function handleStart() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
        }
    </script>
</body>
</html>
