<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrazyKonfigs | Precision Redefined</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-body: #ffffff; --bg-nav: rgba(255, 255, 255, 0.95); --bg-card: #ffffff;
            --text-main: #000000; --text-muted: #666666; --accent: #000000;
            --border: #eeeeee; --tag-bg: #f0f0f0; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --clr-owner: #e67e22; --clr-staff: #d4ac0d; --clr-guest: #8e44ad;
            --clr-early: #b7950b; --clr-contributor: #b7950b; --clr-tester: #27ae60;
            --clr-tuff: #555555; --clr-dev: #1e8449;
        }
        body.dark-mode {
            --bg-body: #0a0a0a; --bg-nav: rgba(10, 10, 10, 0.95); --bg-card: #121212;
            --text-main: #ffffff; --text-muted: #aaaaaa; --accent: #ffffff;
            --border: #1f1f1f; --tag-bg: #1a1a1a;
            --clr-owner: #FFA500; --clr-staff: #F5DEB3; --clr-guest: #EE82EE;
            --clr-early: #FFFF00; --clr-contributor: #FFFF00; --clr-tester: #00FF7F;
            --clr-tuff: #FFFFFF; --clr-dev: #2E8B57;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Source Sans Pro', sans-serif; transition: background-color 0.3s ease; line-height: 1.6; overflow-x: hidden; }
        
        #cursor-follower { width: 35px; height: 35px; background: var(--text-main); opacity: 0.15; filter: blur(6px); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); display: block; }
        
        nav { position: fixed; top: 0; width: 100%; padding: 1rem 8%; background: var(--bg-nav); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-k { font-size: 1.8rem; font-weight: 900; color: var(--text-main); border: 2px solid var(--text-main); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 4px; letter-spacing: -2px; padding-right: 2px; }
        .brand-text { font-size: 1.3rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;}
        
        .nav-right { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; list-style: none; gap: 2rem; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 0.9rem; transition: var(--transition); }
        .nav-links a:hover { color: var(--text-main); }
        .theme-toggle { cursor: pointer; background: none; border: none; color: var(--text-main); font-size: 1.2rem; transition: var(--transition); }

        .hero { height: 65vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 5%; margin-top: 60px; }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; margin-bottom: 1rem; letter-spacing: -1.5px; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin-bottom: 2rem; }
        .btn-get-started { padding: 12px 32px; background: var(--text-main); color: var(--bg-body); text-decoration: none; font-weight: 700; border-radius: 50px; display: inline-block; transition: var(--transition); }

        .section-padding { padding: 4rem 10%; }
        .config-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem; }
        .config-header h2 { font-size: 2rem; letter-spacing: -1px; margin-bottom: 0; }
        .filter-group { display: flex; gap: 0.8rem; }
        .filter-btn { padding: 8px 20px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-main); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .filter-btn.active { background: var(--text-main); color: var(--bg-body); border-color: var(--text-main); transform: scale(1.05); }

        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 2rem; }
        .config-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.8rem; transition: var(--transition); display: flex; flex-direction: column; }
        .card-head { margin-bottom: 1.5rem; border-bottom: 2px solid var(--text-main); padding-bottom: 0.5rem; }
        .config-title { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }

        .data-section { margin-bottom: 1.2rem; }
        .section-label { font-size: 0.75rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; display: block; border-bottom: 1px solid var(--border); padding-bottom: 2px; }
        .data-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem;}
        .data-label { color: var(--text-muted); }
        .data-val { font-family: monospace; font-weight: 700; color: var(--text-main); }

        .card-footer { margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center; }
        .system-tag { font-size: 0.7rem; font-weight: 900; background: var(--text-main); color: var(--bg-body); padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .support-info { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
        .creator-tag { font-size: 0.75rem; font-style: italic; color: var(--text-muted); }

        /* Review System Styles */
        .review-trigger { width: 100%; padding: 10px; margin-top: 15px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .review-trigger:hover { background: var(--tag-bg); color: var(--text-main); }
        .review-drawer { display: none; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .comment-feed { max-height: 250px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .tweet-comment { display: flex; gap: 12px; margin-bottom: 15px; font-size: 0.85rem; }
        .tweet-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--tag-bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 700; font-size: 0.7rem; border: 1px solid var(--border); }
        .tweet-user { font-weight: 700; color: var(--text-main); margin-right: 5px; }
        .tweet-stars { color: #f1c40f; font-size: 0.7rem; }
        .post-comment-area { display: flex; flex-direction: column; gap: 10px; background: var(--tag-bg); padding: 12px; border-radius: 12px; }
        .post-comment-area textarea { background: none; border: none; color: var(--text-main); resize: none; font-family: inherit; font-size: 0.85rem; outline: none; width: 100%; min-height: 40px; }
        .post-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 8px; }
        .star-picker { display: flex; gap: 4px; color: #555; }
        .star-picker i { cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .star-picker i.active { color: #f1c40f; }
        .btn-tweet { background: var(--text-main); color: var(--bg-body); border: none; padding: 6px 16px; border-radius: 50px; font-weight: 700; font-size: 0.8rem; cursor: pointer; }

        /* Contributors Styling */
        .contributor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .member-card { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; display: flex; flex-direction: column; gap: 1rem; transition: var(--transition); }
        .member-header { display: flex; align-items: center; gap: 12px; }
        .member-name { font-weight: 700; font-size: 1.1rem; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { font-size: 0.65rem; padding: 3px 10px; border-radius: 50px; font-weight: 700; text-transform: uppercase; background: var(--tag-bg); border: 1px solid currentColor; }

        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); }
        footer p { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 1px; }

        @media (max-width: 768px) { .nav-links { display: none; } .section-padding { padding: 4rem 5%; } }
    </style>
</head>
<body>

    <div id="cursor-follower"></div>

    <nav>
        <a href="#" class="brand">
            <div class="logo-k">K</div>
            <div class="brand-text">KrazyKonfigs</div>
        </a>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="#hero">Home</a></li>
                <li><a href="#configs">Configs</a></li>
                <li><a href="#contributors">Contributors</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <section class="hero" id="hero">
        <h1>Krazy Konfigs</h1>
        <p>Premium optimization presets for competitive play. Precision-tuned profiles for every connection type.</p>
        <a href="#configs" class="btn-get-started">Get Started</a>
    </section>

    <!-- CONFIGS SECTION -->
    <section class="section-padding" id="configs">
        <div class="config-header">
            <h2>Configs</h2>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All Pings</button>
                <button class="filter-btn" data-filter="low">Low Ping</button>
                <button class="filter-btn" data-filter="mid">Mid Ping</button>
                <button class="filter-btn" data-filter="high">High Ping</button>
            </div>
        </div>
        <div class="config-grid" id="config-container">
            <!-- Data loads here -->
        </div>
    </section>

    <!-- CONTRIBUTORS SECTION -->
    <section class="section-padding" id="contributors" style="background: var(--tag-bg); transition: 0.3s;">
        <h2>Contributors</h2>
        <div class="contributor-grid" id="contributor-container">
            <!-- Data loads here -->
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section class="section-padding" id="contact">
        <h2 style="text-align:center; margin-bottom:3rem;">Contact</h2>
        <div class="contact-form-container" style="max-width:600px; margin:0 auto; border: 1px solid var(--border); padding: 2rem; border-radius: 12px; background: var(--bg-card);">
            <form id="webhookForm">
                <input type="text" id="dcUser" placeholder="Discord Username" style="width:100%; padding:10px; margin-bottom:1rem; border:1px solid var(--border); border-radius:5px; background: var(--bg-body); color: var(--text-main);" required>
                <textarea id="dcDetails" rows="5" maxlength="1000" placeholder="Details (Suggestions or Requests)... Max 1000 Chars" style="width:100%; padding:10px; margin-bottom:1rem; border:1px solid var(--border); border-radius:5px; background: var(--bg-body); color: var(--text-main);" required></textarea>
                <label style="font-size:0.75rem; font-weight:700; color:var(--text-muted); display:block; margin-bottom:5px;">Include File (Max 10MB)</label>
                <input type="file" id="dcFile" style="width:100%; margin-bottom:1rem; color: var(--text-muted); font-size: 0.8rem;">
                <button type="submit" id="submitBtn" style="width:100%; padding:12px; background:var(--text-main); color:var(--bg-body); border:none; font-weight:700; border-radius:5px; cursor:pointer;">Submit Request</button>
            </form>
        </div>
    </section>

    <footer><p>© 2026 KRAZY KONFIGS • PURE PRECISION</p></footer>

    <script>
        const SUPABASE_URL = "https://unjdjduiqtldgoybgmnq.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuamRqZHVpcXRsZGdveWJnbW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzgzODEsImV4cCI6MjA5MzAxNDM4MX0.qMuQcBysiKuFD5ByoL17fs0KxClgI-FEyzyKYayNVdE";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let allConfigs = [];
        let currentRatings = {};

        async function init() {
            await fetchConfigs();
            await fetchContributors();
        }

        async function fetchConfigs() {
            const { data, error } = await _supabase.from('configs').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);
            allConfigs = data;
            renderConfigs(allConfigs);
            setupFilters();
        }

        function renderConfigs(configs) {
            const container = document.getElementById('config-container');
            if (!configs || configs.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:var(--text-muted); width:100%;">No configs found.</p>`;
                return;
            }

            container.innerHTML = configs.map(conf => `
                <div class="config-card">
                    <div class="card-head"><div class="config-title">${conf.title}</div></div>
                    
                    <div class="data-section">
                        <span class="section-label">🎯 PREDICTION</span>
                        <div class="data-row"><span class="data-label">Simulation Timer</span> <span class="data-val">${conf.sim_timer}</span></div>
                        <div class="data-row"><span class="data-label">Prediction Interval</span> <span class="data-val">${conf.pred_interval}</span></div>
                    </div>

                    <div class="data-section">
                        <span class="section-label">⚙️ TOGGLES (ACTIVE)</span>
                        <div class="data-row"><span class="data-label">Prioritize Ping</span> <span class="data-val">ON</span></div>
                        <div class="data-row"><span class="data-label">Predict Jump</span> <span class="data-val">ON</span></div>
                        <div class="data-row"><span class="data-label">Predict Lag</span> <span class="data-val">ON</span></div>
                        <div class="data-row"><span class="data-label">Ping Predict</span> <span class="data-val">ON</span></div>
                    </div>

                    <div class="data-section">
                        <span class="section-label">📊 MULTIPLIERS</span>
                        <div class="data-row"><span class="data-label">Vertical</span> <span class="data-val">${conf.vertical || '0'}</span></div>
                        <div class="data-row"><span class="data-label">Horizontal</span> <span class="data-val">${conf.horizontal || '0'}</span></div>
                    </div>

                    <div class="data-section">
                        <span class="section-label">📍 OFFSETS (X / Y / Z)</span>
                        <div class="data-row"><span class="data-label">Values</span> <span class="data-val">${conf.offsets || '0 / 0 / 0'}</span></div>
                    </div>

                    <div class="card-footer">
                        <div style="display:flex; flex-direction:column;">
                            <span class="system-tag">Revert | ${conf.hit_rate || '0'}% Hit Rate</span>
                            <span class="support-info">Supports: ${conf.support_range || 'N/A'}</span>
                        </div>
                        <span class="creator-tag">by ${conf.creator || 'Unknown'}</span>
                    </div>

                    <button class="review-trigger" onclick="toggleReviews(${conf.id})">
                        <i class="far fa-comment"></i> View Reviews & Ratings
                    </button>

                    <div class="review-drawer" id="drawer-${conf.id}">
                        <div class="comment-feed" id="feed-${conf.id}">Loading...</div>
                        <div class="post-comment-area">
                            <textarea id="input-${conf.id}" placeholder="Post your review..."></textarea>
                            <div class="post-footer">
                                <div class="star-picker" id="stars-${conf.id}">
                                    <i class="fas fa-star" onclick="setStar(${conf.id}, 1)"></i>
                                    <i class="fas fa-star" onclick="setStar(${conf.id}, 2)"></i>
                                    <i class="fas fa-star" onclick="setStar(${conf.id}, 3)"></i>
                                    <i class="fas fa-star" onclick="setStar(${conf.id}, 4)"></i>
                                    <i class="fas fa-star" onclick="setStar(${conf.id}, 5)"></i>
                                </div>
                                <button class="btn-tweet" onclick="postReview(${conf.id})">Post</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleReviews(id) {
            const drawer = document.getElementById(`drawer-${id}`);
            const isOpen = drawer.style.display === 'block';
            drawer.style.display = isOpen ? 'none' : 'block';
            if(!isOpen) fetchReviews(id);
        }

        async function fetchReviews(id) {
            const feed = document.getElementById(`feed-${id}`);
            const { data } = await _supabase.from('reviews').select('*').eq('config_id', id).order('created_at', { ascending: false });
            if (!data || data.length === 0) { feed.innerHTML = `<p style="font-size:0.75rem; color:var(--text-muted); text-align:center;">No reviews yet.</p>`; return; }
            feed.innerHTML = data.map(r => `
                <div class="tweet-comment">
                    <div class="tweet-avatar">${r.poster_name ? r.poster_name.substring(0,2).toUpperCase() : 'GU'}</div>
                    <div class="tweet-body">
                        <span class="tweet-user">Guest</span>
                        <span class="tweet-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                        <div class="tweet-text">${r.comment}</div>
                    </div>
                </div>
            `).join('');
        }

        function setStar(configId, val) {
            currentRatings[configId] = val;
            const stars = document.getElementById(`stars-${configId}`).children;
            for(let i=0; i<5; i++) stars[i].classList.toggle('active', i < val);
        }

        async function postReview(configId) {
            const comment = document.getElementById(`input-${configId}`).value;
            const rating = currentRatings[configId] || 5;
            if(!comment.trim()) return alert("Enter a comment.");
            const { error } = await _supabase.from('reviews').insert([{ config_id: configId, poster_name: "Guest", comment: comment, rating: rating }]);
            if (error) alert("Error posting."); else { document.getElementById(`input-${configId}`).value = ""; fetchReviews(configId); }
        }

        async function fetchContributors() {
            const { data } = await _supabase.from('contributors').select('*');
            if (!data) return;
            document.getElementById('contributor-container').innerHTML = data.map(m => `
                <div class="member-card">
                    <div class="member-header"><i class="${m.role_icon}" style="color: ${m.icon_color}"></i><span class="member-name">${m.name}</span></div>
                    <div class="tag-list">${m.tags ? m.tags.map(t => `<span class="tag" style="color: var(--clr-${t.toLowerCase().replace(/\s+/g, '')}, var(--text-muted));">${t}</span>`).join('') : ''}</div>
                </div>
            `).join('');
        }

        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.onclick = () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const val = btn.getAttribute('data-filter').toLowerCase();
                    renderConfigs(val === 'all' ? allConfigs : allConfigs.filter(c => (c.ping_tier || "").toLowerCase().includes(val)));
                };
            });
        }

        document.getElementById('webhookForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true; submitBtn.innerText = "Sending...";
            const formData = new FormData();
            formData.append('payload_json', JSON.stringify({
                embeds: [{ title: "New Config Request", fields: [{ name: "User", value: document.getElementById('dcUser').value }, { name: "Details", value: document.getElementById('dcDetails').value }], timestamp: new Date() }]
            }));
            try {
                await fetch("https://discord.com/api/webhooks/1498387587092709468/EY0XBVlIy5cnAgaIJxWbTliIB8lPvfrywiCXM4tMmw6Y2D7ku5wgIbFFSb-8YC_wCECz", { method: 'POST', body: formData });
                alert('Sent!'); this.reset();
            } finally { submitBtn.disabled = false; submitBtn.innerText = "Submit Request"; }
        });

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.querySelector('#themeBtn i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        const follower = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => { follower.style.left = e.clientX + 'px'; follower.style.top = e.clientY + 'px'; });

        init();
    </script>
</body>
</html>
