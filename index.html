<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrazyKonfigs | Precision Redefined</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-body: #ffffff; --bg-nav: rgba(255, 255, 255, 0.95); --bg-card: #ffffff;
            --text-main: #000000; --text-muted: #666666; --accent: #000000;
            --border: #eeeeee; --tag-bg: #f8f8f8; --transition: all 0.3s ease;
        }
        body.dark-mode {
            --bg-body: #0a0a0a; --bg-nav: rgba(10, 10, 10, 0.95); --bg-card: #121212;
            --text-main: #ffffff; --text-muted: #aaaaaa; --accent: #ffffff;
            --border: #1f1f1f; --tag-bg: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Source Sans Pro', sans-serif; transition: var(--transition); line-height: 1.6; }
        nav { position: fixed; top: 0; width: 100%; padding: 1rem 8%; background: var(--bg-nav); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-top: 60px; }
        .section-padding { padding: 2rem 8%; }
        
        /* Config Card UI */
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 2rem; }
        .config-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: var(--transition); }
        .config-title { font-size: 1.3rem; font-weight: 700; border-bottom: 2px solid var(--text-main); padding-bottom: 8px; margin-bottom: 10px; }
        
        /* Sleek Review Section */
        .review-toggle-btn { background: var(--tag-bg); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.8rem; width: 100%; transition: 0.2s; }
        .review-toggle-btn:hover { background: var(--text-main); color: var(--bg-body); }
        
        .review-box { display: none; margin-top: 15px; background: var(--tag-bg); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .review-list { max-height: 250px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .review-item { display: flex; gap: 12px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .review-pfp { width: 32px; height: 32px; border-radius: 50%; background: #2c2f33; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.7rem; }
        .review-content { flex: 1; font-size: 0.85rem; }
        .review-user-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .review-user { font-weight: 700; color: var(--text-main); }
        .review-stars { color: #f1c40f; font-size: 0.75rem; }
        .review-text { color: var(--text-muted); line-height: 1.4; }

        /* Compact Form */
        .review-form { display: grid; gap: 8px; margin-top: 10px; }
        .form-row { display: flex; gap: 8px; }
        .review-form input, .review-form textarea { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 6px; font-size: 0.8rem; width: 100%; }
        .star-input { display: flex; gap: 5px; color: #555; cursor: pointer; font-size: 1rem; margin: 5px 0; }
        .post-btn { background: var(--text-main); color: var(--bg-body); border: none; padding: 10px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .post-btn:hover { opacity: 0.8; }

        .filter-group { display: flex; gap: 10px; margin-bottom: 2rem; justify-content: center; }
        .filter-btn { padding: 8px 20px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-main); cursor: pointer; font-weight: 600; }
        .filter-btn.active { background: var(--text-main); color: var(--bg-body); }
    </style>
</head>
<body class="dark-mode">

    <nav>
        <div style="font-weight:900; font-size:1.4rem; letter-spacing: -1px;">KRAZY KONFIGS</div>
        <button onclick="document.body.classList.toggle('dark-mode')" style="background:none; border:none; color:inherit; cursor:pointer; font-size: 1.2rem;"><i class="fas fa-adjust"></i></button>
    </nav>

    <section class="hero">
        <h1>Community Feedback</h1>
        <p style="color: var(--text-muted);">Verified configs and user testimonials.</p>
    </section>

    <section class="section-padding">
        <div class="filter-group" id="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="low">Low Ping</button>
            <button class="filter-btn" data-filter="mid">Mid Ping</button>
            <button class="filter-btn" data-filter="high">High Ping</button>
        </div>
        <div class="config-grid" id="config-container"></div>
    </section>

    <script>
        const SUPABASE_URL = "https://unjdjduiqtldgoybgmnq.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuamRqZHVpcXRsZGdveWJnbW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzgzODEsImV4cCI6MjA5MzAxNDM4MX0.qMuQcBysiKuFD5ByoL17fs0KxClgI-FEyzyKYayNVdE";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allConfigs = [];
        let currentRatings = {};

        async function init() {
            const { data } = await _supabase.from('configs').select('*').order('created_at', { ascending: false });
            allConfigs = data || [];
            renderConfigs(allConfigs);
            setupFilters();
        }

        function renderConfigs(configs) {
            const container = document.getElementById('config-container');
            container.innerHTML = configs.map(conf => `
                <div class="config-card">
                    <div class="config-title">${conf.title}</div>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom: 15px;">
                        <i class="fas fa-signal"></i> ${conf.ping_tier} &nbsp; <i class="fas fa-user-edit"></i> ${conf.creator}
                    </div>
                    
                    <button class="review-toggle-btn" onclick="toggleReviews(${conf.id})">
                        <i class="fas fa-star"></i> View Reviews
                    </button>

                    <div class="review-box" id="review-box-${conf.id}">
                        <div class="review-list" id="review-list-${conf.id}"></div>
                        
                        <div class="review-form">
                            <div class="form-row">
                                <input type="text" id="name-${conf.id}" placeholder="Username">
                                <input type="text" id="pid-${conf.id}" placeholder="Discord ID">
                            </div>
                            <textarea id="comment-${conf.id}" rows="2" placeholder="Write a sleek review..."></textarea>
                            <div class="star-input" id="stars-${conf.id}">
                                <i class="fas fa-star" onclick="setRating(${conf.id}, 1)"></i>
                                <i class="fas fa-star" onclick="setRating(${conf.id}, 2)"></i>
                                <i class="fas fa-star" onclick="setRating(${conf.id}, 3)"></i>
                                <i class="fas fa-star" onclick="setRating(${conf.id}, 4)"></i>
                                <i class="fas fa-star" onclick="setRating(${conf.id}, 5)"></i>
                            </div>
                            <button class="post-btn" onclick="postReview(${conf.id})">Post Review</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleReviews(configId) {
            const box = document.getElementById(`review-box-${configId}`);
            const isVisible = box.style.display === 'block';
            box.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) fetchReviews(configId);
        }

        async function fetchReviews(configId) {
            const list = document.getElementById(`review-list-${configId}`);
            list.innerHTML = `<p style="font-size:0.7rem; text-align:center;">Loading reviews...</p>`;
            
            const { data } = await _supabase.from('reviews').select('*').eq('config_id', configId).order('created_at', { ascending: false });
            
            if (!data || data.length === 0) {
                list.innerHTML = `<p style="font-size:0.7rem; color:var(--text-muted); text-align:center;">No feedback yet. Be the first!</p>`;
                return;
            }

            list.innerHTML = data.map(r => `
                <div class="review-item">
                    <div class="review-pfp"><i class="fab fa-discord"></i></div>
                    <div class="review-content">
                        <div class="review-user-row">
                            <span class="review-user">${r.poster_name}</span>
                            <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                        </div>
                        <p class="review-text">${r.comment}</p>
                    </div>
                </div>
            `).join('');
        }

        function setRating(id, val) {
            currentRatings[id] = val;
            const stars = document.getElementById(`stars-${id}`).children;
            for(let i=0; i<5; i++) stars[i].style.color = i < val ? '#f1c40f' : '#555';
        }

        async function postReview(configId) {
            const name = document.getElementById(`name-${configId}`).value;
            const pId = document.getElementById(`pid-${configId}`).value;
            const comment = document.getElementById(`comment-${configId}`).value;
            const rating = currentRatings[configId] || 5;

            if(!name || !comment || !pId) return alert("Please fill in all fields (including Discord ID)!");

            const { error } = await _supabase.from('reviews').insert([
                { config_id: configId, poster_name: name, poster_id: pId, comment: comment, rating: rating }
            ]);

            if (error) {
                console.error(error);
                alert("Error! Make sure 'poster_id' column exists and RLS is enabled.");
            } else {
                document.getElementById(`comment-${configId}`).value = "";
                fetchReviews(configId);
            }
        }

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const f = btn.getAttribute('data-filter');
                    const filtered = f === 'all' ? allConfigs : allConfigs.filter(c => c.ping_tier.toLowerCase().includes(f));
                    renderConfigs(filtered);
                };
            });
        }

        init();
    </script>
</body>
</html>
