<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KrazyKonfigs | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-body: #ffffff; --text-main: #000000; --text-muted: #666666; --border: #eeeeee; }
        body.dark-mode { --bg-body: #0a0a0a; --text-main: #ffffff; --text-muted: #aaaaaa; --border: #1f1f1f; }
        
        body {
            background: var(--bg-body);
            color: var(--text-main);
            font-family: 'Source Sans Pro', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.4s;
            margin: 0;
        }

        .login-card {
            background: var(--bg-body);
            border: 1px solid var(--border);
            padding: 4rem;
            text-align: center;
            width: 100%;
            max-width: 450px;
            border-radius: 8px;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .discord-btn {
            background: #5865F2;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 18px;
            font-weight: 700;
            border-radius: 4px;
            margin-top: 2.5rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .discord-btn:hover { filter: brightness(1.1); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(88, 101, 242, 0.2); }
        .theme-toggle { position: absolute; top: 30px; right: 30px; background: none; border: none; color: var(--text-main); cursor: pointer; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>

    <div class="login-card">
        <h2 style="font-weight: 900; letter-spacing: -2px; font-size: 2rem;">AUTHORIZATION</h2>
        <p style="color: var(--text-muted); margin-top: 10px;">Please authenticate via Discord to view the KrazyVault index.</p>
        
        <a href="index.html" class="discord-btn">
            <i class="fab fa-discord"></i> Login with Discord
        </a>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') toggleTheme();
    </script>
</body>
</html>
