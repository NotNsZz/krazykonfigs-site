<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KrazyKonfigs | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-body: #ffffff; --text-main: #000000; --text-muted: #666666; --border: #eeeeee; }
        body.dark-mode { --bg-body: #0a0a0a; --text-main: #ffffff; --text-muted: #aaaaaa; --border: #1f1f1f; }
        body { background: var(--bg-body); color: var(--text-main); font-family: 'Source Sans Pro', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; transition: background-color 0.4s ease, color 0.4s ease; margin: 0; }
        .login-card { background: var(--bg-body); border: 1px solid var(--border); padding: 4rem; text-align: center; width: 100%; max-width: 450px; border-radius: 8px; animation: slideUp 0.8s ease; transition: background-color 0.4s ease, border-color 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .discord-btn { background: #5865F2; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 18px; font-weight: 700; border-radius: 4px; margin-top: 2.5rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; width: 100%; }
        .discord-btn:hover { filter: brightness(1.1); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(88, 101, 242, 0.2); }
        .theme-toggle { position: absolute; top: 30px; right: 30px; background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 1.2rem; transition: color 0.4s ease; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
    <div class="login-card">
        <h2 style="font-weight: 900; letter-spacing: -2px; font-size: 2rem;">AUTHORIZATION</h2>
        <p style="color: var(--text-muted); margin-top: 10px;">Please authenticate via Discord to view the KrazyVault index.</p>
        <button onclick="signInWithDiscord()" class="discord-btn">
            <i class="fab fa-discord"></i> Login with Discord
        </button>
    </div>
    <script>
        const _supabase = supabase.createClient('https://unjdjduiqtldgoybgmnq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuamRqZHVpcXRsZGdveWJnbW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MzgzODEsImV4cCI6MjA5MzAxNDM4MX0.qMuQcBysiKuFD5ByoL17fs0KxClgI-FEyzyKYayNVdE');
        
        async function signInWithDiscord() {
            await _supabase.auth.signInWithOAuth({ 
                provider: 'discord', 
                options: { redirectTo: window.location.origin + window.location.pathname.replace('login.html', 'dashboard.html') } 
            });
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Initialize theme properly on load
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.body.classList.remove('dark-mode');
                document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>';
            }
        });
    </script>
</body>
</html>
